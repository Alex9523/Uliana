<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Дві кнопки</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f4f4f4;
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .btn {
      position: absolute;
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      background: #222;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-normal {
      top: 50%;
      left: 40%;
      transform: translate(-50%, -50%);
    }

    .btn-escape {
      top: 50%;
      left: 60%;
      transform: translate(-50%, -50%);
      background: #c62828;
    }

    .btn-normal:hover {
      background: #444;
    }
  </style>
</head>
<body>
<div class="stage" id="stage">
  <button class="btn btn-normal">Звичайна кнопка</button>
  <button class="btn btn-escape" id="escapeBtn">Спіймай мене</button>
</div>

<script>
  const btn = document.getElementById('escapeBtn');
  const stage = document.getElementById('stage');

  function moveButton() {
    const stageRect = stage.getBoundingClientRect();
    const btnRect = btn.getBoundingClientRect();

    const maxX = stageRect.width - btnRect.width;
    const maxY = stageRect.height - btnRect.height;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    btn.style.left = randomX + 'px';
    btn.style.top = randomY + 'px';
    btn.style.transform = 'translate(0, 0)';
  }

  btn.addEventListener('mouseenter', moveButton);
</script>
</body>
</html>
