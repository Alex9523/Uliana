<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Дві кнопки</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #f4f4f4;
      overflow: hidden;
    }

    .page-title {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 2;
      color: #222;
      width: 90%;
    }

    .page-title h1 {
      font-size: 42px;
      margin-bottom: 14px;
    }

    .page-title h3 {
      font-size: 24px;
      font-weight: normal;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .btn {
      position: absolute;
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 2;
    }

    .btn-normal {
      top: 50%;
      left: 40%;
      transform: translate(-50%, -50%);
      background: #222;
    }

    .btn-escape {
      top: 50%;
      left: 60%;
      transform: translate(-50%, -50%);
      background: #c62828;
    }

    .btn-normal:hover {
      background: #444;
    }

    .beer-particle {
      position: absolute;
      font-size: 28px;
      pointer-events: none;
      user-select: none;
      z-index: 5;
      animation: beerBlast 1.4s ease-out forwards;
      transform: translate(-50%, -50%);
      will-change: transform, opacity;
    }

    @keyframes beerBlast {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) translate(0, 0) scale(0.6) rotate(0deg);
      }
      20% {
        opacity: 1;
        transform: translate(-50%, -50%) translate(calc(var(--x) * 0.2), calc(var(--y) * 0.2)) scale(1) rotate(60deg);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) translate(var(--x), var(--y)) scale(1.4) rotate(220deg);
      }
    }

    .cheers-text {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 56px;
      font-weight: bold;
      color: #d18b00;
      text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.15);
      opacity: 0;
      pointer-events: none;
      z-index: 6;
      animation: cheersPop 1.2s ease-out forwards;
      white-space: nowrap;
    }

    @keyframes cheersPop {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }
      20% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.15);
      }
      60% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.2);
      }
    }
  </style>
</head>
<body>
<div class="page-title">
  <h1>Дорогі хлопци!</h1>
  <h3>Чи будемо ми пити піво в ці файні вихідні</h3>
</div>

<div class="stage" id="stage">
  <button class="btn btn-normal" id="yesBtn">Так</button>
  <button class="btn btn-escape" id="escapeBtn">Ні!!</button>
</div>

<script>
  const btn = document.getElementById('escapeBtn');
  const yesBtn = document.getElementById('yesBtn');
  const stage = document.getElementById('stage');

  function moveButton() {
    const stageRect = stage.getBoundingClientRect();
    const btnRect = btn.getBoundingClientRect();

    const maxX = stageRect.width - btnRect.width;
    const maxY = stageRect.height - btnRect.height;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    btn.style.left = randomX + 'px';
    btn.style.top = randomY + 'px';
    btn.style.transform = 'translate(0, 0)';
  }

  btn.addEventListener('mouseenter', moveButton);

  yesBtn.addEventListener('click', () => {
    launchBeerFirework();
    showCheersText();
  });

  function launchBeerFirework() {
    const rect = yesBtn.getBoundingClientRect();
    const originX = rect.left + rect.width / 2;
    const originY = rect.top + rect.height / 2;

    const emojis = ['🍺', '🍻', '✨', '🍺', '🍻'];

    for (let i = 0; i < 36; i++) {
      const particle = document.createElement('div');
      particle.className = 'beer-particle';
      particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];

      const angle = Math.random() * Math.PI * 2;
      const distance = 100 + Math.random() * 220;
      const x = Math.cos(angle) * distance;
      const y = Math.sin(angle) * distance - Math.random() * 60;

      particle.style.setProperty('--x', `${x}px`);
      particle.style.setProperty('--y', `${y}px`);
      particle.style.left = `${originX}px`;
      particle.style.top = `${originY}px`;

      document.body.appendChild(particle);

      setTimeout(() => {
        particle.remove();
      }, 1400);
    }
  }

  function showCheersText() {
    const oldText = document.querySelector('.cheers-text');
    if (oldText) oldText.remove();

    const text = document.createElement('div');
    text.className = 'cheers-text';
    text.textContent = '🍻 Погнали! 🍻';

    document.body.appendChild(text);

    setTimeout(() => {
      text.remove();
    }, 1200);
  }
</script>
</body>
</html>
